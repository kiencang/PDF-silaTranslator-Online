<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 text-slate-900 font-sans">
  <!-- Header -->
  <app-header-controls 
    [attr.inert]="showResetConfirm() ? true : null"
    [isProcessing]="isProcessing()"
    [selectedModel]="selectedModel()"
    [hasUserApiKey]="userApiKey() !== ''"
    (modelChange)="selectedModel.set($event)"
    (openApiKeyModal)="openApiKeyModal()">
  </app-header-controls>

  <main class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-8" [attr.inert]="showResetConfirm() ? true : null">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <!-- Left Column: Controls & Upload -->
      <div class="lg:col-span-4 space-y-6">
        
        <!-- Upload Section -->
        <app-upload-zone
          [isProcessing]="isProcessing()"
          [hasFile]="hasFile()"
          [hasResult]="!!resultHtml()"
          [selectedFile]="selectedFile()"
          [pdfTotalPages]="pdfTotalPages()"
          [pdfStartPage]="pdfStartPage()"
          [pdfEndPage]="pdfEndPage()"
          [tokenCount]="tokenCount()"
          [isCountingTokens]="isCountingTokens()"
          [currentMaxTokens]="currentMaxTokens()"
          [tokenPercentage]="tokenPercentage()"
          [error]="error()"
          (fileChange)="onFileSelected($event)"
          (pageChange)="pdfStartPage.set($event.start); pdfEndPage.set($event.end); onPageChange()"
          (resetApp)="resetApp()"
        ></app-upload-zone>

        <!-- Configuration Section -->
        <app-config-section
          [modeControl]="modeControl"
          [useGoogleSearchControl]="useGoogleSearchControl"
          [isHtmlUploaded]="isHtmlUploaded()"
          [isPdfUploaded]="isPdfUploaded()"
          [isTwoPhaseMode]="isTwoPhaseMode()"
          [isProcessing]="isProcessing()"
          [canProcess]="canProcess()"
          [hasResultHtml]="!!resultHtml()"
          [progressMessage]="progressMessage()"
          (openSettings)="openSettings()"
          (processFile)="processFile()">
        </app-config-section>
      </div>

      <!-- Right Column: Results -->
      <div class="lg:col-span-8 lg:sticky lg:top-8 lg:h-[calc(100vh-4rem)]" [class.z-50]="isFullscreen()">
        <app-result-section
          [isFullscreen]="isFullscreen()"
          [isProcessing]="isProcessing()"
          [resultHtml]="resultHtml()"
          [htmlContent]="resultHtml()"
          [progressMessage]="progressMessage()"
          [formattedTime]="formattedTime()"
          (downloadHtml)="downloadHtml()"
          (toggleFullscreen)="isFullscreen.set(!isFullscreen())">
        </app-result-section>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 mt-8" [attr.inert]="showResetConfirm() ? true : null">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-6 flex items-center justify-center">
      <p class="text-sm text-slate-600">
        <a href="https://pdf-translator.wpsila.com/" target="_blank" rel="noopener noreferrer" class="text-indigo-600 hover:text-indigo-700 hover:underline font-medium transition-colors">
          Hướng dẫn sử dụng
        </a> • Nguyễn Đức Anh • contact@wpsila.com • v1.0.43 • <a href="https://github.com/kiencang/PDF-silaTranslator-Online" target="_blank" rel="noopener noreferrer" class="text-indigo-600 hover:text-indigo-700 hover:underline font-medium transition-colors">
          GitHub
        </a>
      </p>
    </div>
  </footer>

  <!-- Toast Notifications -->
  <app-toasts></app-toasts>

  <!-- Reset Confirmation Modal -->
  @if (showResetConfirm()) {
    <app-reset-confirm-modal
      (confirm)="confirmReset()"
      (cancelConfirm)="cancelReset()">
    </app-reset-confirm-modal>
  }

  <!-- Settings Modal -->
  @if (showSettingsModal()) {
    <app-settings-modal 
      [initialMode]="defaultModeControl.value"
      (save)="$event && (defaultModeControl.setValue($event)); saveSettings()"
      (closeModal)="closeSettings()">
    </app-settings-modal>
  }

  <!-- Gemini API Key Configuration Modal -->
  @if (showApiKeyModal()) {
    <app-api-key-modal
      [initialApiKey]="tempApiKey()"
      [hasUserApiKey]="userApiKey() !== ''"
      (save)="tempApiKey.set($event); saveApiKey()"
      (clear)="clearApiKey()"
      (closeModal)="closeApiKeyModal()">
    </app-api-key-modal>
  }
</div>
